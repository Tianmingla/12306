server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/ticket/**,/api/trainDetail/**
        - id: seat-service
          uri: lb://seat-service
          predicates:
            - Path=/api/seat/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**,/api/reminder/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# 流量监控配置
traffic:
  peak-threshold: 100
  monitor-interval: 1s

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
