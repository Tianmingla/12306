server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/ticket/**
        - id: seat-service
          uri: lb://seat-service
          predicates:
            - Path=/api/seat/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
  data:
    redis:
      host: localhost
      port: 6379


# 流量监控配置
traffic:
  peak-threshold: 100 # 每秒请求数阈值，超过则标记为高峰
  monitor-interval: 1s
