server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/my12306?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
      auto-commit: true
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 2000ms
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
      password: ""
      username: ""

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:rocketmq-namesrv:9876}
  producer:
    group: seat-release-consumer

# 支付宝开放平台（沙箱）
alipay:
  enabled: true
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  app-id: 9021000157633330
  private-key: 
  alipay-public-key: |
    
  notify-url: http://gateway-service:8080/api/order/pay/notify
  return-url: http://gateway-service:8080/api/order/pay/return
  frontend-base-url: http://localhost:3000
  sign-type: RSA2

# 出行提醒配置
reminder:
  enabled: true
  depart-before-1h-minutes: 60
  depart-before-30m-minutes: 30

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.lalal: INFO
    org.springframework: WARN