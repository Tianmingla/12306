
spring:
  application:
#    name: 12306-order${unique-name:}-service
    name: order-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my12306?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    type: com.zaxxer.hikari.HikariDataSource

    # HikariCP 连接池配置（可选但推荐）
    hikari:
      connection-timeout: 30000        # 等待连接池分配连接的最大时间（ms）
      idle-timeout: 600000             # 连接空闲多久后被回收（ms）
      max-lifetime: 1800000            # 连接最大存活时间（ms），建议小于 MySQL wait_timeout
      maximum-pool-size: 20            # 最大连接数
      minimum-idle: 5                  # 最小空闲连接数
      auto-commit: true                # 是否自动提交
      connection-test-query: SELECT 1  # 检测连接是否有效的 SQL（MySQL 8+ 可省略）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms       # 连接超时
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      password: ""
      username: ""
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: seat-release-consumer
server:
  port: 8083

# 支付宝开放平台（沙箱）https://open.alipay.com/develop/sandbox/app
# 将 app-id、应用私钥(PKCS8)、支付宝公钥粘贴到下方；notify-url 需公网可访问（本地可用内网穿透到网关 8080）
alipay:
  enabled: true
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  app-id: 9021000157633330
  private-key: 
  alipay-public-key: |
    
  notify-url: http://localhost:8080/api/order/pay/notify
  return-url: http://localhost:8080/api/order/pay/return
  frontend-base-url: http://localhost:3000
  sign-type: RSA2

# 出行提醒配置
reminder:
  enabled: true
  # 发车前多久提醒（分钟）
  depart-before-1h-minutes: 60
  depart-before-30m-minutes: 30