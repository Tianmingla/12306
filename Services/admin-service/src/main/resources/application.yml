spring:
  application:
    name: admin-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my12306?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
      auto-commit: true
      connection-test-query: SELECT 1
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      password: ""
      username: ""

server:
  port: 8085

# JWT 配置（与网关保持一致）
jwt:
  secret: 12306-secret-key-12306-secret-key-12306-secret-key
  expiration: 86400000  # 24小时

# 管理后台统计缓存配置
admin:
  cache:
    dashboard-ttl: 300       # Dashboard 缓存 5 分钟
    stats-ttl: 3600          # 统计数据缓存 1 小时
    train-distribution-ttl: 86400  # 列车分布缓存 1 天
