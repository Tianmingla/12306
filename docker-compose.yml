version: '3.8'

services:
  # ==================== Infrastructure ====================
  mysql:
    image: mysql:8.0
    container_name: 12306-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: my12306
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./createTable.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./initNacos.sql:/docker-entrypoint-initdb.d/02-init-nacos.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --slow-query-log=1
      - --long-query-time=1
      - --log-queries-not-using-indexes=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - 12306-network

  redis:
    image: redis:7-alpine
    container_name: 12306-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 12306-network

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: 12306-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=123456
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - JVM_XMS=256m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - 12306-network

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: 12306-rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      - JAVA_OPT_EXT=-server -Xms128m -Xmx256m
    command: sh mqnamesrv
    healthcheck:
      # test: ["CMD-SHELL", "nc -z localhost 9876"]
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9876; echo $?; exec 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 12306-network

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: 12306-rocketmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      - JAVA_OPT_EXT=-server -Xms256m -Xmx512m
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    volumes:
      - rocketmq_data:/home/rocketmq/store
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf:ro
    networks:
      - 12306-network

  rocketmq-topic-init:
    image: apache/rocketmq:5.1.4
    container_name: 12306-rocketmq-topic-init
    depends_on:
      rocketmq-broker:
        condition: service_started
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    volumes:
      - ./rocketmq/init-topics.sh:/home/rocketmq/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/home/rocketmq/init-topics.sh"]
    networks:
      - 12306-network

  # ==================== Monitoring ====================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: 12306-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - 12306-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: 12306-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - 12306-network

  # ==================== Application Services ====================
  gateway-service:
    build:
      context: .
      dockerfile: Services/gateway-service/Dockerfile
    container_name: 12306-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - 12306-network

  user-service:
    build:
      context: .
      dockerfile: Services/user-service/Dockerfile
    container_name: 12306-user
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - 12306-network

  ticket-service:
    build:
      context: .
      dockerfile: Services/ticket-service/Dockerfile
    container_name: 12306-ticket
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROCKETMQ_NAMESRV=rocketmq-namesrv:9876
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - 12306-network

  seat-service:
    build:
      context: .
      dockerfile: Services/seat-service/Dockerfile
    container_name: 12306-seat
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROCKETMQ_NAMESRV=rocketmq-namesrv:9876
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - 12306-network

  order-service:
    build:
      context: .
      dockerfile: Services/order-service/Dockerfile
    container_name: 12306-order
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ROCKETMQ_NAMESRV=rocketmq-namesrv:9876
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - 12306-network

  admin-service:
    build:
      context: .
      dockerfile: Services/admin-service/Dockerfile
    container_name: 12306-admin
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - 12306-network

volumes:
  mysql_data:
  redis_data:
  rocketmq_data:
  prometheus_data:
  grafana_data:

networks:
  12306-network:
    driver: bridge
